<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Archive - PIN Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 800px;
            width: 1280px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }
        
        .logo svg {
            width: 45px;
            height: 45px;
            fill: white;
        }
        
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #8892b0;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .pin-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            margin: 0 auto;
        }
        
        .lock-icon {
            width: 60px;
            height: 60px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }
        
        .lock-icon svg {
            width: 28px;
            height: 28px;
            fill: #667eea;
        }
        
        .pin-title {
            color: white;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .pin-subtitle {
            color: #8892b0;
            font-size: 13px;
            margin-bottom: 25px;
        }
        
        .pin-dots {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-radius: 50%;
            background: #667eea;
        }
        
        .pin-dot.empty {
            background: transparent;
        }
        
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .num-btn {
            width: 70px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .num-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        
        .footer {
            margin-top: 30px;
            color: #8892b0;
            font-size: 12px;
        }
        
        .footer span {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h1>ChatGPT Archive</h1>
        <p class="subtitle">Secure Backup & Offline Viewer</p>
        
        <div class="pin-container">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </div>
            <p class="pin-title">Enter your PIN</p>
            <p class="pin-subtitle">Secure your conversation archive</p>
            
            <div class="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot empty"></div>
            </div>
            
            <div class="numpad">
                <button class="num-btn">1</button>
                <button class="num-btn">2</button>
                <button class="num-btn">3</button>
                <button class="num-btn">4</button>
                <button class="num-btn">5</button>
                <button class="num-btn">6</button>
                <button class="num-btn">7</button>
                <button class="num-btn">8</button>
                <button class="num-btn">9</button>
                <button class="num-btn"></button>
                <button class="num-btn">0</button>
                <button class="num-btn">⌫</button>
            </div>
        </div>
        
        <p class="footer">🔒 <span>AES-256 Encrypted</span> • 100% Local • Zero Data Collection</p>
    </div>
</body>
</html>
