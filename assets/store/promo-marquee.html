<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Marquee - 1400x560</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            width: 1400px;
            height: 560px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 100px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(102, 126, 234, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 70% 30%, rgba(118, 75, 162, 0.2) 0%, transparent 40%);
        }
        
        .content {
            flex: 1;
            position: relative;
            z-index: 1;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 20px;
            padding: 6px 14px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        h1 {
            color: white;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.1;
        }
        
        .tagline {
            color: #8892b0;
            font-size: 24px;
            margin-bottom: 32px;
        }
        
        .features {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 20px;
            color: #e2e8f0;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .visual {
            width: 500px;
            height: 400px;
            position: relative;
            z-index: 1;
        }
        
        .card {
            position: absolute;
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            padding: 20px;
        }
        
        .card-main {
            width: 320px;
            height: 280px;
            top: 60px;
            left: 80px;
            z-index: 2;
        }
        
        .card-floating {
            width: 180px;
            height: 140px;
            top: 20px;
            left: 300px;
            z-index: 3;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .card-bg {
            width: 280px;
            height: 200px;
            top: 100px;
            left: 40px;
            z-index: 1;
            opacity: 0.5;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .card-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        
        .card-title {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        
        .card-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .line {
            height: 8px;
            background: #334155;
            border-radius: 4px;
        }
        
        .line.short { width: 60%; }
        .line.medium { width: 80%; }
        .line.long { width: 100%; }
        
        .lock-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .lock-badge svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="badge">🔒 Privacy First</div>
        <h1>ChatGPT Archive</h1>
        <p class="tagline">Secure Backup & Offline Viewer for Your AI Conversations</p>
        <div class="features">
            <span class="feature">🔐 PIN Protection</span>
            <span class="feature">📱 Offline Access</span>
            <span class="feature">🎨 Color Categories</span>
            <span class="feature">🔌 Notion & Obsidian</span>
            <span class="feature">🔍 Full-Text Search</span>
        </div>
    </div>
    <div class="visual">
        <div class="card card-bg">
            <div class="card-content">
                <div class="line long"></div>
                <div class="line medium"></div>
                <div class="line short"></div>
            </div>
        </div>
        <div class="card card-main">
            <div class="card-header">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <span class="card-title">ChatGPT Archive</span>
            </div>
            <div class="card-content">
                <div class="line long"></div>
                <div class="line medium"></div>
                <div class="line long"></div>
                <div class="line short"></div>
            </div>
            <div class="lock-badge">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
            </div>
        </div>
        <div class="card card-floating">
            <div class="card-content">
                <div class="line long"></div>
                <div class="line medium"></div>
                <div class="line short"></div>
            </div>
        </div>
    </div>
</body>
</html>
