<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Small - 440x280</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            width: 440px;
            height: 280px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            position: relative;
            z-index: 1;
        }
        
        .logo svg {
            width: 45px;
            height: 45px;
            fill: white;
        }
        
        h1 {
            color: white;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        .tagline {
            color: #8892b0;
            font-size: 14px;
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        .features {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            font-size: 12px;
        }
        
        .feature-icon {
            width: 16px;
            height: 16px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1>ChatGPT Archive</h1>
    <p class="tagline">Secure Backup & Offline Viewer</p>
    <div class="features">
        <div class="feature">
            <span class="feature-icon">🔒</span>
            <span>PIN Protected</span>
        </div>
        <div class="feature">
            <span class="feature-icon">📱</span>
            <span>Offline</span>
        </div>
        <div class="feature">
            <span class="feature-icon">🔌</span>
            <span>Notion</span>
        </div>
    </div>
</body>
</html>
